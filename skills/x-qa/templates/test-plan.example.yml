feature: avatar-upload
entry_point: api
acceptance:
  - "User can upload a jpeg ≤ 2MB"
  - "Server rejects >2MB with 413"
qa_strategy:
  base_url_var: BASE_URL
test_cases:
  - id: tc-001
    category: happy
    covers: ["trans:none->active"]
    complexity: simple
    description: "GET /health responds 200"
    request: { method: GET, path: /health }
    assertions:
      - { kind: status, expr: "", op: eq, value: 200 }

  - id: tc-002
    category: auth
    covers: ["fmode:auth:missing-expired"]
    complexity: complex
    description: "POST /auth/login returns token"
    request:
      method: POST
      path: /auth/login
      body: { user: "${FIXTURE_USER}", pass: "${FIXTURE_PASS}" }
    assertions:
      - { kind: status, expr: "", op: eq, value: 200 }
      - { kind: body-jsonpath, expr: "$.token", op: matches, value: "^[A-Za-z0-9._-]+$" }

  - id: tc-003
    category: happy
    covers: ["inv:owner-only", "field:avatar.size:max-2mb"]
    complexity: complex
    description: "Upload avatar with token from tc-002"
    depends_on: [tc-002]
    request:
      method: POST
      path: /me/avatar
      headers: { Authorization: "Bearer ${TC_002_TOKEN}" }
    assertions:
      - { kind: status, expr: "", op: eq, value: 201 }
      - { kind: body-jsonpath, expr: "$.owner_id", op: eq, value: "${FIXTURE_USER}" }
